name: Render image

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'render/**'
      - 'make.sh'
      - 'entrypoint-new.sh'
      - 'docker_run.sh'
      - 'openstreetmap-carto'
      - '.github/workflows/render-image.yml'
  push:
    branches: [web-frontend]
    paths:
      - 'Dockerfile'
      - 'render/**'
      - 'make.sh'
      - 'entrypoint-new.sh'
      - 'docker_run.sh'
      - 'openstreetmap-carto'
      - '.github/workflows/render-image.yml'

concurrency:
  group: render-image-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: osm-before-after-render

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REG="${{ steps.login-ecr.outputs.registry }}"
            echo "tags=$REG/${ECR_REPOSITORY}:latest,$REG/${ECR_REPOSITORY}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${ECR_REPOSITORY}:pr" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
